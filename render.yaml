services:
  # Backend API Service
  - type: web
    name: superagent-api
    env: docker
    dockerfilePath: ./libs/superagent/Dockerfile
    dockerContext: ./libs/superagent
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MEMORY
        value: motorhead
      - key: MEMORY_API_URL
        value: https://memory.superagent.sh
      - key: VECTORSTORE
        value: pinecone
      - key: SUPERAGENT_API_URL
        value: https://superagent-api.onrender.com

  # Frontend UI Service
  - type: web
    name: superagent-ui
    env: docker
    dockerfilePath: ./libs/ui/Dockerfile
    dockerContext: ./libs/ui
    plan: starter
    region: oregon
    branch: main
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPERAGENT_API_URL
        value: https://superagent-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false